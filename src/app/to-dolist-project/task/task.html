<div class=" p-4 shadow-xs border max-w-106.5 border-[#E5E5E5] rounded-xl flex flex-col gap-2.5   justify-center items-center ">
    <div class=" flex justify-between w-full ">
 
        <span class="font-semibold text-center rounded-lg  bg-[#EFF6FF] flex items-center gap-1 px-2 py-0.5"
        [class.text-[#F8FAFC]]="newtask().taskstats" 
            [class.bg-[#FEF2F2]]="newtask().taskstats==='Canceled'" 
            [class.bg-[#EFF6FF]]="newtask().taskstats==='In Progress'" 
             [class.bg-[#ECFDF5]]="newtask().taskstats==='Completed'" >

           <span class=" ">
            <svg width="8" [class.text-[#314158]]="newtask().taskstats" 
            [class.text-red-700]="newtask().taskstats==='Canceled'" 
            [class.text-blue-700]="newtask().taskstats==='In Progress'" 
             [class.text-emerald-700]="newtask().taskstats==='Completed'" 
             height="8" viewBox="0 0 8 8"  xmlns="http://www.w3.org/2000/svg">
<circle cx="4" cy="4" r="4" fill="currentColor" d="..."/>
</svg>

        </span>
        <span class="font-semibold text-[12px] "
        [class.text-[#314158]]="newtask().taskstats" 
            [class.text-red-700]="newtask().taskstats==='Canceled'" 
            [class.text-blue-700]="newtask().taskstats==='In Progress'" 
             [class.text-emerald-700]="newtask().taskstats==='Completed'" >
            {{newtask().taskstats}}
        </span>
           
        </span>
        <span class="relative">
                   <svg width="16" height="16" viewBox="0 0 24 24" fill="#333" (click)="opentaskstatus()" >
  <circle cx="12" cy="5" r="2"/>
  <circle cx="12" cy="12" r="2"/>
  <circle cx="12" cy="19" r="2"/>
</svg>
@if (taskstatusisopen) {
    <form class="flex flex-col font-normal text-sm border border-[#E5E5E5] rounded-lg text-gray-500 absolute bg-white top-0 right-0 ulstatus" #ulstats >
    <label for="Backlog" class="border-b border-[#E5E5E5] text-center cursor-pointer hover:bg-gray-200 transition-all p-0.5 px-2 "  >Backlog
        <input type="radio" id="Backlog" name="Backlog" class="sr-only"  (change)="show($event)" value="Backlog"  >
    </label >
    <label for="Canceled" class="border-b border-[#E5E5E5] text-center cursor-pointer hover:bg-gray-200 transition-all p-0.5 px-2"  >Canceled
        <input type="radio" id="Canceled" name="Canceled" class="sr-only"  (change)="show($event)" value="Canceled">
    </label >
    <label for="Completed" class="border-b border-[#E5E5E5] text-center cursor-pointer hover:bg-gray-200 transition-all p-0.5 px-2"  >Completed
        <input type="radio" id="Completed" name="Completed" class="sr-only"  (change)="show($event)" value="Completed">
    </label >
    <label for="In Progress" class="border-b  border-[#E5E5E5] text-center cursor-pointer hover:bg-gray-200 transition-all p-0.5 px-2  whitespace-nowrap  "  >In Progress
        <input type="radio" id="In Progress"name="In Progress" class="sr-only"  (change)="show($event)" value="In Progress">
    </label >
    </form>
}
        </span>
        


    </div>
<div class="w-full">
    <h2 class="font-semibold text-[16px] ">{{newtask().taskname}}</h2>
    <p class="line-clamp-1 truncate text-[#737373]">
{{newtask().describion}}    
</div>
    <div class="w-full flex items-center justify-between">
    <p  class="text-[14px] font-medium" >    Assignees:
</p>
<div>
    <img [src]="selectedimg?.img" [alt]="selectedimg?.name">

</div>
</div>    
<div class="flex justify-between w-full gap-2.5" >
    <p class="text-[14px] font-normal text-[#737373]  w-27.5 h-5 flex gap-2 items-center ">

       {{newtask().date|date:'dd MMM yyyy'}}
    </p>
    <p [class.bg-[#FFEECB]]='newtask().pririty==="Medium"' 
     [class.bg-red-200]="newtask().pririty==='High'"
     [class.text-[#C10007]]="newtask().pririty==='High'"
     [class.bg-green-200]="newtask().pririty==='low'"
     [class.text-green-600]="newtask().pririty==='low'"

      class="  text-[#BA6E00] text-center text-[12px]  font-medium rounded-lg py-0.5 flex flex-col justify-center  px-2">
       {{newtask().pririty}}
    </p>
</div>
</div>
